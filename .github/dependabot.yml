version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      uv-dev:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      uv-prod-patch:
        dependency-type: "production"
        update-types:
          - "patch"
      # Major dev-dep updates and minor/major prod-dep updates → individual PRs

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
