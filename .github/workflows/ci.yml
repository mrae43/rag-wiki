name: CI

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag_wiki
          POSTGRES_PASSWORD: rag_wiki
          POSTGRES_DB: rag_wiki_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -e ".[dev]"
      - run: ruff check --output-format=github .
      - run: ruff format --check .
      - run: mypy .
      - run: pytest --cov=rag_wiki --cov-report=xml --cov-fail-under=60 --junitxml=results/test-results.xml
        env:
          DATABASE_URL: postgresql+asyncpg://rag_wiki:rag_wiki@localhost:5432/rag_wiki_test

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: results/test-results.xml

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
