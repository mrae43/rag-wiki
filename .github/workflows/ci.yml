#                         docs/adr/ mentions a chart.                         #
#   - nightly [mineru]/[s3] smoke + SeaweedFS service container: optional-deps #
#     smoke per ADR-0002/0015; defer until those extras have test coverage.    #
#   - live-provider job   : gated on a secret, default runs stay mocked.       #
#   - pip-audit           : third-party dependency audit (nightly).            #
