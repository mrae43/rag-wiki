name: CI

# Least privilege: nothing granted by default; elevated per job where needed.
permissions: {}

"on":
  pull_request:
    branches: [main]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - "docker-compose.yml"
      - "alembic/**"
      - "alembic.ini"
      - "tests/**"
      - "rag_wiki/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/codeql.yml"
      - ".github/workflows/_build-scan-push.yml"
      - "docs/ci-context.md"
      # Infra / config / docs that otherwise leave PRs blocked under ruleset
      # required_status_checks (ADR-0018 §#3). Keep narrow; widen deliberately.
      - "AGENTS.md"
      - ".github/*.json"
      - "scripts/**"
      # Prod compose + deploy artifacts (PRD-005): resource/log policy,
      # backup validator, restore drill, image-tag pinner.
      - "deploy/**"
  push:
    branches: [main]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - "docker-compose.yml"
      - "alembic/**"
      - "alembic.ini"
      - "tests/**"
      - "rag_wiki/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/codeql.yml"
      - ".github/workflows/_build-scan-push.yml"
      - "docs/ci-context.md"
      # Mirror pull_request set — direct pushes to main are blocked by the
      # ruleset's `pull_request` rule anyway; kept for symmetry / future
      # relaxation. Same narrow surface as pull_request above.
      - "AGENTS.md"
      - ".github/*.json"
      - "scripts/**"
      - "deploy/**"
  workflow_dispatch:

# Doc-only changes (docs/**, *.md, context/**) do not trigger this workflow
# except for ci-context.md and .github/workflows/**, which always trigger,
# plus a narrow infra/config set (AGENTS.md, .github/*.json, scripts/*.sh)
# required to unblock ruleset-gated PRs (ADR-0018 §#3 required_status_checks).
# The explicit paths allowlist above achieves that by simply not listing
# docs/** and *.md.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  # Tests mock the ChatProvider / EmbeddingProvider / StorageProvider at the
  # import level (see tests/conftest.py Fake* providers), so no real LLM keys
  # are ever set in CI. DATABASE_URL is overridden per-job where a Postgres
  # service container is attached.
  DATABASE_URL: postgresql+asyncpg://rag_wiki:rag_wiki@localhost:5432/rag_wiki_test

jobs:
  # ----------------------------------------------------------------------- #
  # lint — fail-fast gate. No services. Runs ruff check + ruff format check. #
  # ----------------------------------------------------------------------- #
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --extra dev --frozen
      - name: Ruff check
        run: uv run ruff check --output-format=github .
      - name: Ruff format check
        run: uv run ruff format --check .

  # ----------------------------------------------------------------------- #
  # typecheck — mypy against the package source. Depends on lint.            #
  # ----------------------------------------------------------------------- #
  typecheck:
    name: Typecheck (mypy)
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Restore mypy cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}-src-${{ hashFiles('rag_wiki/**/*.py', 'tests/**/*.py') }}
          restore-keys: |
            mypy-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}-
            mypy-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-
      - name: Install dependencies
        run: uv sync --extra dev --frozen
      - name: Run mypy
        run: uv run mypy .

  # ----------------------------------------------------------------------- #
  # test — pytest against pgvector/pg16 service container. Depends on lint.  #
  # ----------------------------------------------------------------------- #
  test:
    name: Run unit tests
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag_wiki
          POSTGRES_PASSWORD: rag_wiki
          POSTGRES_DB: rag_wiki_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --extra dev --frozen
      - name: Run pytest
        run: |
          uv run pytest \
            --cov=rag_wiki \
            --cov-report=xml \
            --cov-fail-under=60 \
            --junitxml=results/test-results.xml
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: results/test-results.xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.xml

  # ----------------------------------------------------------------------- #
  # migrations — alembic upgrade + drift check. Parallel to test/typecheck.  #
  # ----------------------------------------------------------------------- #
  migrations:
    name: Check migrations (drift + upgrade + downgrade)
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag_wiki
          POSTGRES_PASSWORD: rag_wiki
          POSTGRES_DB: rag_wiki_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --extra dev --frozen
      - name: Apply migrations (alembic upgrade head)
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - name: Detect model/migration drift (alembic check)
        run: uv run alembic check
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - name: Verify downgrade path (pytest tests/db/test_migration.py)
        run: uv run pytest tests/db/test_migration.py -v
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

  # ----------------------------------------------------------------------- #
  # backup-validation — verify pg_dump -Fc archives with pg_restore --list.  #
  # Parallel to migrations; does not need the project test suite.            #
  # ----------------------------------------------------------------------- #
  backup-validation:
    name: Validate backup dumps
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag_wiki
          POSTGRES_PASSWORD: rag_wiki
          POSTGRES_DB: rag_wiki_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --extra dev --frozen
      - name: Seed core tables and generate known-good dump
        run: |
          PGPASSWORD=rag_wiki psql -U rag_wiki -d ragwiki_test -h localhost -c "CREATE TABLE sources (id serial PRIMARY KEY);"
          PGPASSWORD=rag_wiki psql -U rag_wiki -d ragwiki_test -h localhost -c "CREATE TABLE chunks (id serial PRIMARY KEY);"
          PGPASSWORD=rag_wiki psql -U rag_wiki -d ragwiki_test -h localhost -c "CREATE TABLE entities (id serial PRIMARY KEY);"
          PGPASSWORD=rag_wiki psql -U rag_wiki -d ragwiki_test -h localhost -c "CREATE TABLE relations (id serial PRIMARY KEY);"
          PGPASSWORD=rag_wiki psql -U rag_wiki -d ragwiki_test -h localhost -c "CREATE TABLE wiki_pages (id serial PRIMARY KEY);"
          PGPASSWORD=rag_wiki psql -U rag_wiki -d ragwiki_test -h localhost -c "CREATE TABLE jobs (id serial PRIMARY KEY);"
          PGPASSWORD=rag_wiki pg_dump -U rag_wiki -Fc ragwiki_test -h localhost > /tmp/good.dump
          pg_restore --list /tmp/good.dump >/dev/null
      - name: Validate known-good dump exits 0
        run: |
          uv run python scripts/dump_validator.py /tmp/good.dump
      - name: Validate zero-byte dump exits non-zero with reason
        run: |
          : > /tmp/empty.dump
          if uv run python scripts/dump_validator.py /tmp/empty.dump; then
            echo "ERROR: empty dump should have failed validation" >&2
            exit 1
          fi
      - name: Validate corrupt dump exits non-zero with reason
        run: |
          cp tests/scripts/fixtures/corrupt.dump /tmp/corrupt.dump
          if uv run python scripts/dump_validator.py /tmp/corrupt.dump; then
            echo "ERROR: corrupt dump should have failed validation" >&2
            exit 1
          fi
      - name: Run pytest backup-validator tests
        run: uv run pytest tests/scripts/test_dump_validator.py -v
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

  # ----------------------------------------------------------------------- #
  # build-images — single shared image, buildx + GHA layer cache.             #
  # Needs test + migrations + backup-validation (the heavy gates) before     #
  # paying for a build.                                                       #
  # ----------------------------------------------------------------------- #
  build-images:
    name: Build image
    needs: [test, migrations, backup-validation]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Export image artifact for scan job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-image
          path: /tmp/image.tar
        # NOTE: build-push-action does not write a tar by default. The scan
        # job re-runs buildx with cache-from so the image is reconstructed
        # from the GHA cache cheaply — avoids a multi-GB artifact upload.

  # ----------------------------------------------------------------------- #
  # scan-images — Trivy vulnerability scan before any push to a registry.    #
  # ----------------------------------------------------------------------- #
  scan-images:
    name: Scan image (Trivy)
    needs: build-images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Rebuild image from cache for scanning
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          load: true
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  # ----------------------------------------------------------------------- #
  # push-images — push the scanned image to GHCR with :latest + :sha-<short>. #
  # Main push OR workflow_dispatch only (never on PRs). ADR-0017 §4.          #
  # ----------------------------------------------------------------------- #
  push-images:
    name: Push image to GHCR
    needs: [scan-images]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_build-scan-push.yml
    with:
      primary-tag: latest
    secrets: inherit

  # ----------------------------------------------------------------------- #
  # deploy — manual-gate only (workflow_dispatch). SSHes to the VM and runs   #
  # `compose pull && up -d --remove-orphans`. ADR-0017 §4.                    #
  # ----------------------------------------------------------------------- #
  deploy:
    name: Deploy to VM
    needs: push-images
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    environment: production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: SSH to VM and roll the stack
        # Pinned to v1.2.5 commit SHA (matches the file's SHA-pin convention).
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            # ADR-0017 §4 / PRD-005 Gap #5 — pin IMAGE_TAG to the exact SHA CI
            # just built and scanned, atomically and idempotently, before
            # `compose pull`. Refuses to run if `IMAGE_TAG=` is absent in .env
            # (protects operators who forgot to set it). Rollback stays a
            # one-line .env edit. The pinner is stdlib-only, so `python3` runs
            # it on the VM without needing uv or the project venv installed.
            python3 scripts/pin_image_tag.py deploy/.env sha-${GITHUB_SHA::7}
            docker compose -f deploy/docker-compose.prod.yml pull
            docker compose -f deploy/docker-compose.prod.yml up -d --remove-orphans

