name: Release

# Tag-triggered release pipeline (ADR-0018 §#11).
# Builds, scans, pushes the `:v*.*.*` image to GHCR, then creates a
# GitHub Release with auto-generated notes from PRs since the last tag.
#
# The commit being tagged was already validated by ci.yml on `main` push,
# so this workflow skips lint/typecheck/test and goes straight to delivery.

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

jobs:
  # ----------------------------------------------------------------------- #
  # build-scan-push — reusable workflow; builds + pushes + scans in one job. #
  # ----------------------------------------------------------------------- #
  build-scan-push:
    name: Build, scan, and push release image
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_build-scan-push.yml
    with:
      primary-tag: ${{ github.ref_name }}
    secrets: inherit

  # ----------------------------------------------------------------------- #
  # create-release — GitHub Release with auto-generated notes.               #
  # ----------------------------------------------------------------------- #
  create-release:
    name: Create GitHub Release
    needs: build-scan-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
