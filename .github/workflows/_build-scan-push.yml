name: Build, scan, and push Docker image (reusable)

# Reusable workflow: build, push to GHCR, and Trivy-scan the image.
#
# Caller provides the primary tag (e.g. "latest", "v1.2.3").
# The short-SHA tag (sha-<7>) is always added automatically.
#
# Requires `secrets: inherit` in the caller so GITHUB_TOKEN is available.

on:
  workflow_call:
    inputs:
      primary-tag:
        description: "Primary image tag (e.g. 'latest', 'v1.2.3')"
        required: true
        type: string

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
      - name: Login to GHCR
        # Auto-provisioned GITHUB_TOKEN (ADR-0017 §5); no long-lived PAT.
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        # Image name is the literal `rag-wiki` (matches compose `image:` and
        # GHCR package name). Owner namespace comes from github.repository_owner.
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rag-wiki:${{ inputs.primary-tag }}
            ghcr.io/${{ github.repository_owner }}/rag-wiki:sha-${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/rag-wiki:${{ inputs.primary-tag }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
