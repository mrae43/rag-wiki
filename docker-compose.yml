services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: uv run uvicorn rag_wiki.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app           # hot reload during dev
    depends_on:
      db:
        condition: service_healthy
      seaweedfs_filer:
        condition: service_healthy

  worker:
    build: .
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: uv run python -m rag_wiki.worker
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      seaweedfs_filer:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    profiles:
      - dev-tools
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_ADDRESS: 0.0.0.0
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      db:
        condition: service_healthy

  seaweedfs_master:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs_master
    command: "master -port=9333"
    ports:
      - "9333:9333"
    volumes:
      - seaweedfs_master_data:/data

  seaweedfs_volume:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs_volume
    command: "volume -mserver=seaweedfs_master:9333"
    depends_on:
      seaweedfs_master:
        condition: service_started
    volumes:
      - seaweedfs_volume_data:/data

  seaweedfs_filer:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs_filer
    command: "filer -port=8333 -master=seaweedfs_master:9333 -s3 -s3.port=8334 -defaultStoreDir=/data"
    ports:
      - "8333:8333"
      - "8334:8334"
    depends_on:
      seaweedfs_master:
        condition: service_started
      seaweedfs_volume:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8333/"]
      interval: 5s
      timeout: 10s
      retries: 20

volumes:
  postgres_data:
  pgadmin_data:
  seaweedfs_master_data:
  seaweedfs_volume_data: