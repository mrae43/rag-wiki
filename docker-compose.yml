services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ragwiki
      POSTGRES_PASSWORD: ragwiki
      POSTGRES_DB: ragwiki
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragwiki"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: uv run uvicorn ragwiki.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app           # hot reload during dev
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: uv run python -m ragwiki.worker
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: